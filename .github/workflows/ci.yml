name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/sdk[dev]"

      - name: Lint with ruff
        run: |
          cd packages/sdk
          ruff check src/ tests/

      - name: Run tests with coverage
        run: |
          cd packages/sdk
          python -m pytest tests/ -v --cov=attio --cov-report=term-missing --cov-report=xml --tb=short

      - name: Check coverage threshold
        run: |
          cd packages/sdk
          coverage_pct=$(python -m pytest tests/ --cov=attio --cov-report=term 2>/dev/null | grep "^TOTAL" | awk '{print $NF}' | tr -d '%')
          if [ -n "$coverage_pct" ] && [ "$coverage_pct" -lt 95 ]; then
            echo "::warning::Coverage is ${coverage_pct}%, below the 95% target"
          else
            echo "Coverage: ${coverage_pct}%"
          fi

  # mypy is informational — does not block CI
  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/sdk[dev]"

      - name: Run mypy
        run: |
          cd packages/sdk
          mypy src/attio/ || echo "::warning::mypy found type errors (non-blocking)"
