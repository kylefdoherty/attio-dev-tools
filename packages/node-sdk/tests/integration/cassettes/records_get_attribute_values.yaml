      [], "company_research": [{"active_from": "2026-05-09T21:45:52.955000000Z", "active_until":
      null, "created_by_actor": {"type": "system", "id": null}, "value": "## Popl\n\nDomain:
      popl.co\nAs of: 2026-05-09\n\n## Key Facts\n\n- **Headcount:** ~11\u201350 (CRM
      estimate; exact figure not publicly confirmed)\n- **Funding:** ~$2.3\u20132.8M
      total raised (Tracxn reports $2.32M; Pitchbook reports $2.83M)\n- **Stage:**
      Seed \u2014 latest round Apr 2026; backed by Y Combinator, Cathexis Ventures,
