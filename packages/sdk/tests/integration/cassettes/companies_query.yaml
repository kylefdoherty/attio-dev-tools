        "value": "## Hireroger (Roger AI)\n\n**Domain:** hireroger.com\n**As of:**
        2026-05-09\n\n---\n\n### Key Facts\n\n- **Headcount:** ~23 (LinkedIn, May
        2026)\n- **Funding:** $120K reported by PitchBook; conflicting \u2014 Tracxn
        states no funding raised; note a separate *Roger.ai* (accounting automation)
        raised $7.35M Series A in 2019 and should not be conflated\n- **Stage:** YC
        S24 batch (Y Combinator Summer 2024)\n- **GTM motion:** Sales-led / outbound-first
        \u2014 product is an AI SDR, pitched as replacing human SDRs; no self-serve
        signals found\n- **Sales team:** Cannot confirm size; company is ~23 people
        total\n- **Open GTM reqs:** At least 1 \u2014 Head of Sales posted on YC jobs
        board\n- **Product:** AI-powered SDR that automates end-to-end outbound sales
        \u2014 prospect identification, personalized email, follow-up, and meeting
        scheduling \u2014 for small to mid-sized teams\n\n---\n\n### Structural Headline\n\nRoger
        is actively recruiting its first Head of Sales, suggesting the company currently
        has no dedicated sales leadership and may be founder-led on GTM. This is a
        high-signal buying moment \u2014 they are building out their sales org and
