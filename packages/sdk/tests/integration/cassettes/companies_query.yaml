        "value": "## MotherDuck\n\n**Domain:** motherduck.com\n**As of:** 2026-05-10\n\n---\n\n###
        Key Facts\n\n- **Headcount:** ~114 (PitchBook, as of May 2025; CRM record
        shows 11\u201350, likely outdated)\n- **Funding:** ~$133M total raised\n-
        **Stage:** Series B+ (Series B: $52.5M, May 2025; preceded by $33M Series
        B+ extension \u2014 sources vary slightly on exact tranching)\n- **GTM motion:**
        PLG + sales-assist hybrid. Started pure PLG, added a sales layer to drive
        expansion and enterprise deals\n- **Open GTM reqs:** Multiple open AE roles
        (NYC, Seattle, SF), 1 BDR, plus Customer Engineer and Implementation Engineer
        in Customer Success \u2014 5+ GTM postings active on Ashby\n- **Product:**
        Serverless cloud analytics platform built on DuckDB, letting users run SQL
        queries across local and cloud data in a hybrid execution model \u2014 connects
        to Tableau, PowerBI, Hex, and AI agents\n- **ARR:** Estimated $1M\u2013$10M
        (CRM estimate; not publicly confirmed)\n\n---\n\n### Structural Headline\n\nNo
        CRO or CMO found in any public source. CEO Jordan Tigani (ex-Google BigQuery
        founding engineer) appears to be driving GTM strategy directly. The company
        is actively hiring AEs across three cities simultaneously, suggesting it is
        in the early stages of building out a formal sales function for the first
        time.\n\n*Source: jobs.ashbyhq.com/MotherDuck; hybridgtm.com interview with
        Jordan Tigani*", "attribute_type": "text"}], "company_research_2": [{"active_from":
        "2026-05-10T00:22:02.337000000Z", "active_until": null, "created_by_actor":
        {"type": "system", "id": null}, "value": "## MotherDuck\n\nDomain: motherduck.com\nAs
        of: 2026-05-10\n\n### Key Facts\n\n- **Headcount:** ~83\u2013133 (Built In
        lists 83; LinkedIn/StartupHub show ~133 \u2014 sources diverge, likely 83\u2013133)\n-
        **Funding:** $133M total raised\n- **Stage:** Series B+ (May 2025, $33M round
        per Sacra); prior Series B was $52.5M led by Felicis (Sep 2023, $400M post-money
        valuation)\n- **GTM motion:** Hybrid PLG + sales-led; self-serve community
        motion with a small dedicated sales team building out\n- **Sales team:** Small
        \u2014 a \"Founding AE & Head of Sales\" is the named sales lead; RevOps function
        does not yet exist (first RevOps hire is currently open)\n- **Open GTM reqs:**
        Revenue Operations Lead (first-ever RevOps hire) \u2014 signals early GTM
        systems build-out\n- **Product:** Serverless cloud data warehouse built on
        DuckDB; enables fast, collaborative SQL analytics across local and cloud execution\n-
        **Traction:** DuckDB adoption described as \"soaring\"; growing self-serve
        user community \u2014 no specific customer/developer count publicly disclosed\n\n###
        Structural Headline\n\nNo CRO, CMO, or VP Sales exists. The company lists
        a \"Founding AE & Head of Sales\" as the senior-most GTM title, and is currently
        hiring its **first-ever RevOps hire** \u2014 the job posting explicitly describes
        building the RevOps foundation \"from scratch.\" GTM org is nascent and scaling.\n\nSource:
        Built In NYC job posting (builtinnyc.com/job/revenue-operations-lead/4722474),
        LeadIQ employee directory\n\n### Recent News\n\n- **May 2025:** Raised $33M
        Series B+ round, bringing total funding to ~$133M (Sacra)\n- **Feb 2026:**
        Launched public preview of \"Dives\" \u2014 a new feature enabling AI agents
        to build interactive, real-time SQL visualizations in MotherDuck\n- **Ongoing
        2026:** Active hiring for first RevOps lead, signaling GTM systems build-out
        phase", "attribute_type": "text"}]}}, {"id": {"workspace_id": "74716136-8b3f-4b28-b67f-75d3212684e1",
