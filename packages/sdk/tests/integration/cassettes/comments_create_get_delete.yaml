        [], "arr_contribution_usd": [], "company_research": [{"active_from": "2026-05-09T21:45:52.955000000Z",
        "active_until": null, "created_by_actor": {"type": "system", "id": null},
        "value": "## Popl\n\nDomain: popl.co\nAs of: 2026-05-09\n\n## Key Facts\n\n-
        **Headcount:** ~11\u201350 (CRM estimate; exact figure not publicly confirmed)\n-
        **Funding:** ~$2.3\u20132.8M total raised (Tracxn reports $2.32M; Pitchbook
        reports $2.83M)\n- **Stage:** Seed \u2014 latest round Apr 2026; backed by
        Y Combinator, Cathexis Ventures, Urban Innovation Fund, Goat Capital\n- **GTM
        motion:** Hybrid PLG + sales-led; Popl coined their own \"In-Person GTM\"
        (IPM) motion centered on event lead capture and real-world networking\n- **Sales
        team:** VP of Sales identified (Dieter Heren III, promoted from Dir. of RevOps
        in Apr 2025); team size not publicly confirmed\n- **MRR:** $1M+ MRR reported
        (implies ~$12M+ ARR run rate), though estimated ARR range is $1M\u2013$10M\n-
        **Product:** Digital business card and in-person GTM platform for teams \u2014
        event lead capture, contact sharing, and data enrichment\n\n## Structural
        Headline\n\nNo CRO, CMO, or CEO publicly listed. The only named GTM executive
        found is VP of Sales (Dieter Heren III), who was Director of RevOps as recently
        as April 2025 \u2014 suggesting a lean, RevOps-heavy sales org with no dedicated
        marketing leadership visible externally.\n\nSource: LinkedIn (Dieter Heren
        III profile)", "attribute_type": "text"}], "company_research_2": [{"active_from":
        "2026-05-09T21:50:20.409000000Z", "active_until": null, "created_by_actor":
        {"type": "system", "id": null}, "value": "## Popl\n\n**Domain:** popl.co\n**As
        of:** 2026-05-09\n\n---\n\n### Key Facts\n\n- **Headcount:** ~93\u2013125
        (Latka reports 93 in 2024; RocketReach shows 125; LinkedIn says 51\u2013200)\n-
        **Funding:** $2.32M total raised (Seed + YC W21)\n- **Stage:** Seed \u2014
        YC W21 batch; last round Apr 2021 ($2.2M Seed led by Cathexis Ventures, Urban
        Innovation Fund, Goat Capital)\n- **GTM motion:** Hybrid \u2014 PLG-rooted
        (self-serve NFC card + app) with a growing outbound sales layer (SDRs, AEs,
        field marketing)\n- **Sales/GTM team:** 21 open roles listed; active SDR,
        AE, and field marketing hiring signals a scaling GTM org\n- **Open GTM reqs:**
        ~15 of 21 open roles are GTM-facing (SDR, Field Marketing Rep, Experiential
        Marketing Coordinator, Director of Customer Success)\n- **Product:** AI-powered
        digital business card + event lead capture platform for teams and individuals
        \u2014 connects NFC cards/QR codes to a digital profile and CRM-style contact
        capture\n- **Revenue:** ~$12.2M (reported by Latka for 2024) \u2014 well above
        the CRM-estimated $1M\u2013$10M ARR range\n\n---\n\n### Structural Headline\n\nCRO
        seat exists (Dieter Heren) alongside a VP of Marketing (Bryce Alsten) and
        VP of Operations (Natalie Miller) \u2014 the GTM leadership layer is in place,
        but no CFO or dedicated RevOps leader is visible. The CRO is the likely buyer
        or economic gatekeeper.\n\n*Source: RocketReach management page, TheOrg*\n\n---\n\n###
        Recent News\n\n- **No significant funding news found in the last 6 months**
        \u2014 last round was Apr 2021\n- **Active GTM hiring push underway** \u2014
        21 open roles including SDR, Field Marketing Rep, Experiential Marketing Coordinator,
        and Director of Customer Success (as of May 2026; source: LinkedIn, YC Work
        at a Startup)\n- **Product evolution:** Launched", "attribute_type": "text"}]}}]}'
